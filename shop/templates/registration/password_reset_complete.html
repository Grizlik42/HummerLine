{% extends "shop/base.html" %}
{% block title %}Пароль изменён{% endblock %}

{% block content %}
<section class="min-h-[75vh] flex items-center justify-center py-12 px-4 bg-steel-50/50">
  <div class="sm:w-full sm:max-w-md text-center">
    <div class="bg-white px-8 py-12 shadow-panel rounded-[2rem] border border-border/70">

      <!-- Success icon with confetti burst animation -->
      <div class="flex justify-center mb-6">
        <div id="success-wrap" class="relative w-20 h-20 flex items-center justify-center rounded-full bg-pine-50 border-2 border-pine-200">
          <i data-lucide="shield-check" class="w-10 h-10 text-pine-600" id="shield-icon"></i>
        </div>
      </div>

      <h1 class="font-display text-3xl font-bold text-steel-950 mb-3">Пароль изменён!</h1>
      <p class="text-steel-600 mb-8">
        Ваш пароль успешно обновлён. Теперь вы можете войти с новым паролем.
      </p>

      <a href="{% url 'login' %}"
         class="flex w-full items-center justify-center gap-2 rounded-xl bg-ember-500 px-3 py-3.5 text-base font-semibold text-white shadow-display transition hover:bg-ember-600 active:scale-95 mb-3">
        <i data-lucide="log-in" class="w-5 h-5"></i>
        Войти в аккаунт
      </a>
      <a href="{% url 'shop:home' %}"
         class="flex w-full justify-center rounded-xl border border-border px-3 py-3.5 text-base font-semibold text-steel-700 transition hover:bg-steel-50">
        На главную
      </a>
    </div>
  </div>
</section>

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!window.gsap) return;

  // Bounce-in the shield
  gsap.from('#success-wrap', { scale: 0, opacity: 0, duration: 0.7, ease: 'back.out(2.5)', delay: 0.1 });
  gsap.from('#shield-icon', { rotation: -30, duration: 0.6, ease: 'elastic.out(1, 0.4)', delay: 0.4 });
  gsap.from('h1, p, a', { y: 20, opacity: 0, stagger: 0.1, duration: 0.5, ease: 'power2.out', delay: 0.35 });

  // Burst particles from the icon
  const colors = ['#f59e0b', '#10b981', '#f97316', '#3b82f6', '#a855f7'];
  const wrap = document.getElementById('success-wrap');
  const r = wrap.getBoundingClientRect();
  const cx = r.left + r.width / 2 + window.scrollX;
  const cy = r.top + r.height / 2 + window.scrollY;

  setTimeout(() => {
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      const size = Math.random() * 8 + 4;
      Object.assign(p.style, {
        position: 'absolute', left: cx + 'px', top: cy + 'px',
        width: size + 'px', height: size + 'px',
        backgroundColor: colors[i % colors.length],
        borderRadius: '50%', pointerEvents: 'none', zIndex: 9999,
        transform: 'translate(-50%,-50%)'
      });
      document.body.appendChild(p);
      const angle = (i / 12) * Math.PI * 2;
      gsap.to(p, {
        x: Math.cos(angle) * (60 + Math.random() * 50),
        y: Math.sin(angle) * (60 + Math.random() * 50),
        opacity: 0, scale: 0,
        duration: Math.random() * 0.6 + 0.5,
        ease: 'power2.out',
        onComplete: () => p.remove()
      });
    }
  }, 600);
});
</script>
{% endblock %}
{% endblock %}
