[build]
builder = "RAILPACK"

[deploy]
startCommand = "python manage.py collectstatic --noinput && gunicorn core.wsgi:application"
preDeployCommand = "python manage.py migrate && python manage.py shell -c \"from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.filter(username='admin').exists() or User.objects.create_superuser('admin', 'admin@example.com', 'Admin_12345!')\""

[deploy.variables]
RAILPACK_PYTHON_VERSION = "3.13"
